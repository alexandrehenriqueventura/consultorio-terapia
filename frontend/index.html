<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultório L'amour Psique - Firebase</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root{--bg:#f7f2a;}--panel:#111827;--muted:#94a3b8;--text:#e5e7eb;--primary:#2c55e;--primary-600:#16a34a;--ring:#334155;--card:#0b1220;--danger:#ef4444;--warning:#f59e0b;--ok:#2c55e}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:linear-gradient(180deg,#0b1220 0%,#0f172a 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans";a{color:inherit;text-decoration:none}}
    .container{max-width:1100px;margin:0 auto;padding:0 16px}
    .header{position:sticky;top:0;z-index:20;background:rgba(2,6,23,.6);backdrop-filter:saturate(1.2)blur(6px);border-bottom:1px solid var(--ring)}
    .header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
    .logo{display:flex;align-items:center;gap:10px}
    .logo i{color:var(--primary)}
    .nav-menu{display:flex;gap:8px;flex-wrap:wrap}
    .tab-btn{appearance:none;border:1px solid var(--ring);background:#0b1323;color:var(--text);padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:.2s ease}
    .tab-btn:hover{border-color:var(--primary);box-shadow:0 0 2px rgba(34,197,94,.15)inset}
    .tab-btn.active{background:linear-gradient(180deg,#0bfa30,#0b1323);border-color:var(--primary);color:#ecfeff}
    main{padding:24px 0}
    .grid{display:grid;gap:16px}
    .cards{grid-template-columns:repeat(12,1fr)}
    .card{grid-column:span 12;background:linear-gradient(180deg,#0bfa30,#0e1527);border:1px solid var(--ring);border-radius:14px;padding:16px}
    .card h3{margin:4px 0 8px;font-size:14px;color:var(--muted);font-weight:600}
    .metric{font-size:28px;font-weight:700}
    .card .icon{width:40px;height:40px;display:grid;place-items:center;border-radius:10px;background:rgba(34,197,94,.08);color:var(--primary)}
    @keyframes fade{from{opacity:.6;transform:translateY(4px)}to{opacity:1;transform:none}}
    #login-screen{display:grid;place-items:center;min-height:100vh;padding:20px}
    .login-box{background:var(--card);border:1px solid var(--ring);border-radius:14px;padding:32px 24px;max-width:380px;width:100%;animation:fade .6s ease}
    .login-box h2{margin:0 0 24px;font-size:24px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;margin-bottom:6px;font-size:13px;color:var(--muted)}
    .form-group input{width:100%;padding:10px 12px;background:#020617;border:1px solid var(--ring);color:#fff;border-radius:8px;font-size:14px}
    .form-group input:focus{outline:none;border-color:var(--primary)}
    .btn-primary{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px}
    .btn-primary:hover{background:var(--primary-600)}
    .error-msg{color:var(--danger);font-size:13px;margin-top:8px}
    #app{display:none}
  </style>
</head>
<body>
  <!-- Tela de Login -->
  <div id="login-screen">
    <div class="login-box">
      <h2>⚡ Login - Firebase Auth</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
        <p id="login-error" class="error-msg"></p>
      </form>
    </div>
  </div>

  <!-- App Principal (oculto até login) -->
  <div id="app">
    <header class="header">
      <div class="container">
        <div class="header-inner">
          <div class="logo">
            <i class="fas fa-brain"></i>
            <h1 style="margin:0;font-size:18px">Consultório L'amour Psique</h1>
          </div>
          <nav class="nav-menu">
            <button class="tab-btn active" data-tab="dashboard"><i class="fas fa-chart-line"></i>Dashboard</button>
            <button class="tab-btn" data-tab="pacientes"><i class="fas fa-users"></i>Pacientes</button>
            <button class="tab-btn" data-tab="consultas"><i class="fas fa-calendar"></i>Consultas</button>
            <button id="logout-btn" class="tab-btn"><i class="fas fa-sign-out-alt"></i>Sair</button>
          </nav>
        </div>
      </div>
    </header>

    <main class="container">
      <!-- Dashboard -->
      <div id="dashboard-tab" class="tab-content">
        <div class="grid cards">
          <div class="card" style="grid-column:span 3">
            <div class="icon"><i class="fas fa-users"></i></div>
            <h3>Total de Pacientes</h3>
            <div class="metric" id="total-pacientes">0</div>
          </div>
          <div class="card" style="grid-column:span 3">
            <div class="icon"><i class="fas fa-calendar-check"></i></div>
            <h3>Consultas Este Mês</h3>
            <div class="metric" id="total-consultas">0</div>
          </div>
          <div class="card" style="grid-column:span 3">
            <div class="icon"><i class="fas fa-dollar-sign"></i></div>
            <h3>Receita Pendente</h3>
            <div class="metric" id="receita-pendente">R$ 0,00</div>
          </div>
          <div class="card" style="grid-column:span 3">
            <div class="icon"><i class="fas fa-check-circle"></i></div>
            <h3>Pagamentos Recebidos</h3>
            <div class="metric" id="pagos">R$ 0,00</div>
          </div>
        </div>
      </div>

      <!-- Pacientes -->
      <div id="pacientes-tab" class="tab-content" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h2 style="margin:0">Gerenciar Pacientes</h2>
          <button id="add-paciente-btn" class="btn-primary" style="width:auto;padding:10px 20px"><i class="fas fa-plus"></i> Novo Paciente</button>
        </div>
        <div id="pacientes-list"></div>
      </div>

      <!-- Consultas -->
      <div id="consultas-tab" class="tab-content" style="display:none">
        <h2>Consultas Agendadas</h2>
        <div id="consultas-list"></div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import{initializeApp}from'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
    import{getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';
    import{getFirestore}from'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

    const firebaseConfig={apiKey:"AIzaSyAKmzWCQVr1WkUEfItaimjwkRoW18-Kc5M",authDomain:"consultorio-terapia.firebaseapp.com",projectId:"consultorio-terapia",storageBucket:"consultorio-terapia.firebasestorage.app",messagingSenderId:"592781807631",appId:"1:592781807631:web:38dab438e6bebbf854537a"};

    const app=initializeApp(firebaseConfig);
    const auth=getAuth(app);
    const db=getFirestore(app);

    window.auth=auth;
    window.db=db;

    // Login
    document.getElementById('login-form').addEventListener('submit',async(e)=>{
      e.preventDefault();
      const email=document.getElementById('email').value;
      const password=document.getElementById('password').value;
      const errorEl=document.getElementById('login-error');
      try{
        await signInWithEmailAndPassword(auth,email,password);
      }catch(err){
        errorEl.textContent='Credenciais inválidas';
      }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click',()=>signOut(auth));

    // Auth State
    onAuthStateChanged(auth,async(user)=>{
      if(user){
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').style.display='block';
        if(typeof window.loadApp==='function')window.loadApp();
      }else{
        document.getElementById('login-screen').style.display='grid';
        document.getElementById('app').style.display='none';
      }
    });
  </script>

  <!-- App Logic -->
  <script src="/js/script.js"></script>
</body>
</html>
