name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar secrets obrigatórios
        run: |
          MISSING=""
          [ -z "$FIREBASE_API_KEY" ]             && MISSING="$MISSING FIREBASE_API_KEY"
          [ -z "$FIREBASE_AUTH_DOMAIN" ]         && MISSING="$MISSING FIREBASE_AUTH_DOMAIN"
          [ -z "$FIREBASE_PROJECT_ID" ]          && MISSING="$MISSING FIREBASE_PROJECT_ID"
          [ -z "$FIREBASE_STORAGE_BUCKET" ]      && MISSING="$MISSING FIREBASE_STORAGE_BUCKET"
          [ -z "$FIREBASE_MESSAGING_SENDER_ID" ] && MISSING="$MISSING FIREBASE_MESSAGING_SENDER_ID"
          [ -z "$FIREBASE_APP_ID" ]              && MISSING="$MISSING FIREBASE_APP_ID"
          [ -z "$FIREBASE_SERVICE_ACCOUNT" ]     && MISSING="$MISSING FIREBASE_SERVICE_ACCOUNT"
          if [ -n "$MISSING" ]; then
            echo "❌ Secrets ausentes:$MISSING"
            exit 1
          fi
          echo "✅ Todos os secrets presentes"
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT:     ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Gerar env-config.js
        run: |
          printf 'window.__ENV = {\n  "FIREBASE_API_KEY": "%s",\n  "FIREBASE_AUTH_DOMAIN": "%s",\n  "FIREBASE_PROJECT_ID": "%s",\n  "FIREBASE_STORAGE_BUCKET": "%s",\n  "FIREBASE_MESSAGING_SENDER_ID": "%s",\n  "FIREBASE_APP_ID": "%s"\n};\n' \
            "$FIREBASE_API_KEY" \
            "$FIREBASE_AUTH_DOMAIN" \
            "$FIREBASE_PROJECT_ID" \
            "$FIREBASE_STORAGE_BUCKET" \
            "$FIREBASE_MESSAGING_SENDER_ID" \
            "$FIREBASE_APP_ID" \
            > frontend/env-config.js
          echo "✅ env-config.js gerado"
          cat frontend/env-config.js
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Salvar credencial de serviço
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > ${{ github.workspace }}/service-account.json
          python3 -c "import json,sys; json.load(open('${{ github.workspace }}/service-account.json')); print('✅ JSON válido')"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy no Firebase Hosting
        run: |
          firebase deploy --only hosting \
            --project consultorio-terapia \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
