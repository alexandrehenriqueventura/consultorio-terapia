name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar secrets obrigatórios
        run: |
          MISSING=""
          [ -z "$FIREBASE_API_KEY" ]             && MISSING="$MISSING FIREBASE_API_KEY"
          [ -z "$FIREBASE_AUTH_DOMAIN" ]         && MISSING="$MISSING FIREBASE_AUTH_DOMAIN"
          [ -z "$FIREBASE_PROJECT_ID" ]          && MISSING="$MISSING FIREBASE_PROJECT_ID"
          [ -z "$FIREBASE_STORAGE_BUCKET" ]      && MISSING="$MISSING FIREBASE_STORAGE_BUCKET"
          [ -z "$FIREBASE_MESSAGING_SENDER_ID" ] && MISSING="$MISSING FIREBASE_MESSAGING_SENDER_ID"
          [ -z "$FIREBASE_APP_ID" ]              && MISSING="$MISSING FIREBASE_APP_ID"
          [ -z "$FIREBASE_SERVICE_ACCOUNT" ]     && MISSING="$MISSING FIREBASE_SERVICE_ACCOUNT"
          if [ -n "$MISSING" ]; then
            echo "❌ Secrets ausentes:$MISSING"
            exit 1
          fi
          echo "✅ Todos os secrets presentes"
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT:     ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Gerar env-config.js
        run: |
          cat > frontend/env-config.js << 'ENVEOF'
          window.__ENV = {
            "FIREBASE_API_KEY":             "__API_KEY__",
            "FIREBASE_AUTH_DOMAIN":         "__AUTH_DOMAIN__",
            "FIREBASE_PROJECT_ID":          "__PROJECT_ID__",
            "FIREBASE_STORAGE_BUCKET":      "__STORAGE_BUCKET__",
            "FIREBASE_MESSAGING_SENDER_ID": "__MESSAGING_SENDER_ID__",
            "FIREBASE_APP_ID":              "__APP_ID__"
          };
          ENVEOF
          sed -i "s|__API_KEY__|$FIREBASE_API_KEY|g"                         frontend/env-config.js
          sed -i "s|__AUTH_DOMAIN__|$FIREBASE_AUTH_DOMAIN|g"                 frontend/env-config.js
          sed -i "s|__PROJECT_ID__|$FIREBASE_PROJECT_ID|g"                   frontend/env-config.js
          sed -i "s|__STORAGE_BUCKET__|$FIREBASE_STORAGE_BUCKET|g"           frontend/env-config.js
          sed -i "s|__MESSAGING_SENDER_ID__|$FIREBASE_MESSAGING_SENDER_ID|g" frontend/env-config.js
          sed -i "s|__APP_ID__|$FIREBASE_APP_ID|g"                           frontend/env-config.js
          echo "✅ env-config.js gerado"
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Salvar credencial de serviço
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > ${{ github.workspace }}/service-account.json
          python3 -c "import json,sys; json.load(open('${{ github.workspace }}/service-account.json')); print('✅ JSON válido')"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy no Firebase Hosting
        run: |
          firebase deploy --only hosting \
            --project contultoria-terapia \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
